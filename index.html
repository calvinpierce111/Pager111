<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pager</title>
    <style>
        :root {

            --text-secondary: #8E8E93; --separator: rgba(0,0,0,0.08);

            --icon-color: #000000; --verify-fill: #007AFF;
        }
        body.dark {
            --bg: #000000; --text: #FFFFFF; --text-secondary: #98989D;
            --separator: rgba(255,255,255,0.08); --bubble-mine: #0A84FF; --bubble-other: #1C1C1E;
            --input-bg: #1C1C1E; --tab-bg: rgba(28,28,30,0.72); --header-bg: rgba(28,28,30,0.72);
            --sidebar-bg: rgba(28,28,30,0.72); --card-bg: #1C1C1E; --gray4: #38383A;
            --gray5: #1C1C1E; --icon-color: #FFFFFF; --verify-fill: #FFFFFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
            letter-spacing: -0.022em; overflow: hidden; transition: background 0.3s, color 0.3s;
            touch-action: manipulation;
        }
        #app { width:100%; height:100%; height:100dvh; max-width:100%; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }
        @media(min-width:768px) {
            body { padding:16px; background:var(--gray5); }
            #app { height:calc(100vh - 32px); border-radius:32px; flex-direction:row; max-width:880px; box-shadow:0 2px 20px rgba(0,0,0,0.1); }
        }
        .sidebar { display:none; flex-direction:column; background:var(--sidebar-bg); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-right:0.5px solid var(--separator); padding:16px 12px; flex-shrink:0; }
        @media(min-width:768px) { .sidebar { display:flex; width:220px; } }
        .app-title { font-size:20px; padding:8px 12px 24px; font-weight:700; color:var(--text); }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; cursor:pointer; font-size:16px; color:var(--text); font-weight:400; transition:all 0.15s; }
        .nav-item:hover { background:rgba(128,128,128,0.06); }
        .nav-item.active { background:rgba(0,122,255,0.1); color:var(--blue); font-weight:500; }
        .main-view { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .header { padding:0 16px; display:flex; align-items:center; background:var(--header-bg); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-bottom:0.5px solid var(--separator); height:44px; flex-shrink:0; z-index:20; }
        .header-left { display:flex; align-items:center; gap:8px; }
        .header-title { font-size:17px; font-weight:600; color:var(--text); }
        .header-back { background:none; border:none; cursor:pointer; padding:4px 8px; display:flex; align-items:center; }
        .header-back svg { width:24px; height:24px; }
        .header-spacer { flex:1; }
        .icon-btn { background:none; border:none; cursor:pointer; padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--icon-color); position:relative; width:40px; height:40px; }
        .icon-btn svg { width:24px; height:24px; }
        .badge-dot { position:absolute; top:2px; right:2px; background:var(--red); color:white; font-size:10px; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:600; }
        .content { flex:1; overflow-y:auto; padding:8px 16px 60px; -webkit-overflow-scrolling:touch; }
        @media(min-width:768px) { .content { padding:16px 20px 20px; } }
        .content::-webkit-scrollbar { display:none; }
        .create-post-card { border:0.5px solid var(--separator); border-radius:14px; padding:12px 16px; margin-bottom:16px; cursor:pointer; display:flex; align-items:center; gap:12px; background:var(--card-bg); }
        .create-post-avatar { width:36px; height:36px; border-radius:50%; background:var(--gray4); overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .create-post-avatar svg { width:28px; height:28px; }
        .create-post-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .create-post-placeholder { color:var(--text-secondary); font-size:15px; }
        .post-card { padding:14px 0; border-bottom:0.5px solid var(--separator); animation:fadeIn 0.2s; position:relative; }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .post-author-row { flex:1; cursor:pointer; }
        .post-author { font-size:15px; font-weight:600; display:flex; align-items:center; gap:4px; }
        .post-time { font-size:13px; color:var(--text-secondary); margin-top:1px; }
        .post-text { font-size:15px; line-height:1.5; margin-bottom:10px; }
        .post-image { width:100%; max-height:400px; object-fit:cover; border-radius:12px; margin-bottom:8px; cursor:pointer; }
        .post-menu-btn { position:absolute; top:14px; right:0; background:none; border:none; cursor:pointer; padding:6px; border-radius:50%; z-index:5; }
        .post-menu-btn svg { width:20px; height:20px; }
        .post-menu-dropdown { position:absolute; top:40px; right:0; background:var(--card-bg); border:0.5px solid var(--separator); border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,0.12); padding:4px; display:none; flex-direction:column; z-index:10; min-width:160px; animation:fadeIn 0.15s; }
        .post-menu-dropdown.show { display:flex; }
        .post-menu-item { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:12px; cursor:pointer; font-size:15px; color:var(--text); transition:background 0.1s; }
        .post-menu-item:hover { background:rgba(128,128,128,0.06); }
        .post-menu-item.danger { color:var(--red); }
        .post-menu-item.danger svg { fill:var(--red); }
        .avatar { border-radius:50%; background:var(--gray4); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
        .avatar svg { width:100%; height:100%; }
        .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .avatar.sm { width:32px; height:32px; } .avatar.md { width:40px; height:40px; } .avatar.lg { width:52px; height:52px; } .avatar.xl { width:100px; height:100px; }
        .verified-badge { display:inline-flex; align-items:center; vertical-align:middle; margin-left:2px; }
        .verified-badge svg { width:18px; height:18px; }
        .tab-bar { position:fixed; bottom:0; left:0; right:0; background:var(--tab-bg); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-top:0.5px solid var(--separator); height:44px; display:none; justify-content:space-around; align-items:center; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
        .tab-bar.show { display:flex; } @media(min-width:768px) { .tab-bar { display:none!important; } }
        .tab-item { display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--text-secondary); font-size:10px; cursor:pointer; padding:6px 12px; border-radius:8px; }
        .tab-item.active { color:var(--blue); }
        .chat-item { display:flex; align-items:center; gap:14px; padding:14px; border-radius:14px; cursor:pointer; position:relative; }
        .chat-item:hover { background:rgba(128,128,128,0.05); }
        .chat-info { flex:1; min-width:0; }
        .chat-name { font-size:16px; font-weight:600; display:flex; align-items:center; gap:4px; }
        .chat-last-msg { color:var(--text-secondary); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        .chat-delete-btn:hover { opacity:1; }

        .message-row { display:flex; margin-bottom:6px; }

        .input-bar { display:flex; padding:4px 12px; gap:4px; background:var(--header-bg); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-top:0.5px solid var(--separator); align-items:center; min-height:44px; flex-shrink:0; position:relative; }

        .input-field:focus { border-color:var(--blue); }
        .attach-popup { position:absolute; bottom:52px; left:12px; background:var(--card-bg); border:0.5px solid var(--separator); border-radius:14px; box-shadow:0 8px 32px rgba(0,0,0,0.15); padding:4px; display:none; z-index:150; }
        .attach-popup.show { display:block; animation:fadeIn 0.15s; }
        .attach-option { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px; cursor:pointer; font-size:15px; color:var(--text); }
        .attach-option:hover { background:rgba(128,128,128,0.06); }
        .auth-container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:32px 24px; gap:14px; background:var(--bg); }
        .auth-logo { width:72px; height:72px; border-radius:20px; background:var(--blue); display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
        .auth-title { font-size:26px; font-weight:700; }
        .auth-input { width:100%; max-width:300px; padding:14px 16px; border-radius:12px; border:0.5px solid var(--separator); background:var(--input-bg); font-size:16px; outline:none; color:var(--text); }
        .auth-input:focus { border-color:var(--blue); }
        .auth-btn { width:100%; max-width:300px; padding:14px; border-radius:14px; font-size:16px; border:none; cursor:pointer; font-weight:600; }
        .auth-btn.primary { background:var(--blue); color:white; } .auth-btn.text { background:transparent; color:var(--blue); font-weight:400; }
        .search-input { width:100%; padding:12px 16px; border-radius:12px; border:0.5px solid var(--separator); background:var(--input-bg); font-size:15px; outline:none; color:var(--text); margin-bottom:16px; }
        .user-card { display:flex; align-items:center; gap:14px; padding:14px; border-radius:14px; cursor:pointer; }
        .user-card:hover { background:rgba(128,128,128,0.05); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn 0.2s; }
        .modal-sheet { background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:600px; padding:20px; padding-bottom:max(20px, env(safe-area-inset-bottom)); animation:slideUp 0.3s; }
        .notification-dropdown { position:fixed; top:48px; right:8px; width:300px; background:var(--card-bg); border:0.5px solid var(--separator); border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,0.12); z-index:200; max-height:60vh; overflow-y:auto; display:none; }
        .notification-dropdown.show { display:block; animation:fadeIn 0.15s; }
        .notification-item { display:flex; gap:10px; padding:12px 16px; border-bottom:0.5px solid var(--separator); cursor:pointer; }
        .settings-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:0.5px solid var(--separator); cursor:pointer; }
        .settings-label { font-size:16px; }
        .settings-value { font-size:16px; color:var(--text-secondary); }
        .empty-state { text-align:center; color:var(--text-secondary); margin-top:60px; font-size:15px; }
        .toast { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:#1d1d1f; color:white; padding:10px 20px; border-radius:20px; font-size:14px; z-index:300; opacity:0; transition:opacity 0.2s; pointer-events:none; }
        .toast.show { opacity:1; }
        .image-viewer { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:300; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s; }
        .image-viewer img { max-width:90%; max-height:80vh; object-fit:contain; border-radius:16px; }
        .image-viewer-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.2); color:white; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:18px; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        input[type="file"] { display:none; }
    </style>
</head>

        const renderChat=c=>{const p=getUser(S.activeChatUserId);const wp=S.chatWallpapers[S.activeChatUserId]||'';c.innerHTML=headerHTML(p.name,()=>{S.activeView='messages';S.activeChatUserId=null;renderApp()},!1)+`<div class="content" id="cm" style="display:flex;flex-direction:column;padding-bottom:8px;${wp?`background-image:url(${wp});background-size:cover;background-position:center;`:''}"></div><div class="input-bar"><button class="icon-btn" id="ab">${getIcon('photo')}</button><div class="attach-popup" id="ap"><div class="attach-option" id="po">📷 Photo</div><div class="attach-option" id="wpBtn">🖼️ Wallpaper</div></div><button class="icon-btn" id="micBtn">${getIcon('mic')}</button><input id="mi" class="input-field" placeholder="Message..."><button class="icon-btn" id="sb" style="color:var(--blue);">${getIcon('send')}</button><input type="file" id="ci" accept="image/*"><input type="file" id="wi" accept="image/*"></div>`;const mc=c.querySelector('#cm');const msgs=S.messages.filter(m=>(m.from===S.currentUser.id&&m.to===S.activeChatUserId)||(m.from===S.activeChatUserId&&m.to===S.currentUser.id)).sort((a,b)=>a.time-b.time);if(!msgs.length)mc.innerHTML='<div class="empty-state">No messages</div>';else{msgs.forEach(m=>{const row=document.createElement('div');row.className=`message-row ${m.from===S.currentUser.id?'mine':'other'}`;if(m.image){const img=document.createElement('img');img.src=m.image;img.className='msg-img';img.addEventListener('click',()=>showImageViewer(m.image));row.appendChild(img)}else if(m.voice){const aud=document.createElement('audio');aud.src=m.voice;aud.controls=!0;aud.style.maxWidth='200px';row.appendChild(aud)}else{const b=document.createElement('div');b.className=`message-bubble ${m.from===S.currentUser.id?'message-mine':'message-other'}`;b.textContent=m.text;row.appendChild(b)}mc.appendChild(row)});requestAnimationFrame(()=>mc.scrollTop=mc.scrollHeight)}c.querySelector('#hb')?.addEventListener('click',()=>{S.activeView='messages';S.activeChatUserId=null;renderApp()});const apEl=c.querySelector('#ap');const abBtn=c.querySelector('#ab');abBtn.addEventListener('click',e=>{e.stopPropagation();apEl.classList.toggle('show')});document.addEventListener('click',(e)=>{if(e.target!==abBtn&&!apEl.contains(e.target))apEl.classList.remove('show')});c.querySelector('#po').addEventListener('click',()=>{apEl.classList.remove('show');c.querySelector('#ci').click()});c.querySelector('#wpBtn').addEventListener('click',()=>{apEl.classList.remove('show');c.querySelector('#wi').click()});c.querySelector('#ci').addEventListener('change',async e=>{const f=e.target.files[0];if(f){const img=await toB64(f);S.messages.push({id:genId(),from:S.currentUser.id,to:S.activeChatUserId,text:'',image:img,time:Date.now()});save();playSound('send');renderApp()}});c.querySelector('#wi').addEventListener('change',async e=>{const f=e.target.files[0];if(f){const img=await toB64(f);S.chatWallpapers[S.activeChatUserId]=img;save();renderApp();showToast('Wallpaper updated')}});const send=()=>{const inp=c.querySelector('#mi');if(!inp.value.trim())return;S.messages.push({id:genId(),from:S.currentUser.id,to:S.activeChatUserId,text:inp.value.trim(),image:null,time:Date.now()});save();playSound('send');renderApp()};c.querySelector('#sb').addEventListener('click',send);c.querySelector('#mi').addEventListener('keypress',e=>{if(e.key==='Enter')send()});let mediaRecorder,audioChunks=[];const micBtn=c.querySelector('#micBtn');const startRec=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({audio:!0});mediaRecorder=new MediaRecorder(stream);audioChunks=[];mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:'audio/webm'});const b64=await new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(blob)});S.messages.push({id:genId(),from:S.currentUser.id,to:S.activeChatUserId,text:'',voice:b64,time:Date.now()});save();playSound('send');renderApp()};mediaRecorder.start();micBtn.style.color='var(--red)';showToast('Recording...')}catch(e){showToast('Microphone denied')}};micBtn.addEventListener('mousedown',startRec);micBtn.addEventListener('touchstart',e=>{e.preventDefault();startRec()});const stopRec=()=>{if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(t=>t.stop());micBtn.style.color='';mediaRecorder=null}};document.addEventListener('mouseup',stopRec);document.addEventListener('touchend',stopRec)};

        const renderProfile=c=>{const u=S.currentUser;c.innerHTML=headerHTML('Profile',null,!0)+`<div class="content" style="display:flex;flex-direction:column;align-items:center;gap:16px;">${av(u,'xl')}<input type="file" id="ai" accept="image/*"><div style="color:var(--blue);cursor:pointer;" id="chPhoto">Change photo</div><div style="font-size:22px;font-weight:600;display:flex;align-items:center;gap:6px;">${u.name}${u.verified?`<span class="verified-badge">${getIcon('verify')}</span>`:''}</div><div style="color:var(--text-secondary);">@${u.username}</div><div style="color:var(--text-secondary);">${u.email}</div><div style="width:100%;max-width:320px;margin:20px auto 0;"><div class="settings-item" id="tcp"><span class="settings-label">Cloud Password</span><span class="settings-value">${u.cloudPassword?'On':'Off'}</span></div>${u.cloudPassword?`<div class="settings-item" id="tver"><span class="settings-label">Verification</span><span class="settings-value">${u.verified?'✓ Verified':'Not verified'}</span></div>`:''}<div class="settings-item" id="tdm"><span class="settings-label">Dark Mode</span><span class="settings-value">${S.darkMode?'On':'Off'}</span></div><div class="settings-item" id="tsnd"><span class="settings-label">Sounds</span><span class="settings-value">${S.sounds?'On':'Off'}</span></div></div><button id="lo" style="color:var(--red);background:none;border:none;margin-top:12px;">Log Out</button></div>`;c.querySelector('#nb')?.addEventListener('click',e=>{e.stopPropagation();showNotifications(e)});c.querySelector('#chPhoto').addEventListener('click',()=>c.querySelector('#ai').click());c.querySelector('#ai').addEventListener('change',async e=>{const f=e.target.files[0];if(f){const b=await toB64(f);u.avatar=b;const idx=S.users.findIndex(x=>x.id===u.id);if(idx!==-1)S.users[idx].avatar=b;S.currentUser=u;save();renderApp()}});c.querySelector('#tdm').addEventListener('click',()=>{S.darkMode=!S.darkMode;save();renderApp()});c.querySelector('#tsnd').addEventListener('click',()=>{S.sounds=!S.sounds;save();renderApp()});c.querySelector('#tcp').addEventListener('click',()=>{const ov=document.createElement('div');ov.className='modal-overlay';ov.innerHTML=`<div class="modal-sheet"><div style="width:36px;height:4px;background:var(--gray);border-radius:2px;margin:0 auto 16px;"></div><h3 style="text-align:center;">Cloud Password</h3>${u.cloudPassword?'<input id="ocp" class="input-field" type="password" placeholder="Current password" style="margin:8px 0;">':''}<input id="ncp" class="input-field" type="password" placeholder="${u.cloudPassword?'New (empty to disable)':'Create password'}" style="margin-bottom:8px;">${u.cloudPassword?'':'<input id="ccp" class="input-field" type="password" placeholder="Confirm" style="margin-bottom:8px;">'}<div style="display:flex;gap:8px;justify-content:flex-end;"><button id="ccl" style="background:none;border:none;color:var(--blue);">Cancel</button><button id="sv" style="background:var(--blue);color:white;border:none;padding:10px 22px;border-radius:18px;font-weight:600;">Save</button></div></div>`;document.body.appendChild(ov);ov.querySelector('#ccl').addEventListener('click',()=>ov.remove());ov.querySelector('#sv').addEventListener('click',()=>{const op=ov.querySelector('#ocp')?.value||'',np=ov.querySelector('#ncp')?.value||'',cp=ov.querySelector('#ccp')?.value||'';if(u.cloudPassword&&op!==u.cloudPassword){showToast('Wrong password');return}if(!u.cloudPassword&&(!np||np.length<3)){showToast('Min 3 chars');return}if(!u.cloudPassword&&np!==cp){showToast('Passwords do not match');return}if(u.cloudPassword&&np===''){u.cloudPassword=null;u.verified=!1}else if(np)u.cloudPassword=np;const idx=S.users.findIndex(x=>x.id===u.id);if(idx!==-1){S.users[idx].cloudPassword=u.cloudPassword;S.users[idx].verified=u.verified}S.currentUser=u;save();ov.remove();showToast(u.cloudPassword?'Saved':'Disabled');renderApp()});ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()})});c.querySelector('#tver')?.addEventListener('click',()=>{if(!u.cloudPassword)return showToast('Enable cloud password first');u.verified=!u.verified;const idx=S.users.findIndex(x=>x.id===u.id);if(idx!==-1)S.users[idx].verified=u.verified;S.currentUser=u;save();showToast(u.verified?'✓ Verified':'Unverified');renderApp()});c.querySelector('#lo').addEventListener('click',()=>{S.currentUser=null;LS.remove('currentUser');renderApp()})};

        const renderUserProfile=c=>{const u=getUser(S.viewingProfileId);c.innerHTML=headerHTML('Profile',()=>{S.activeView='search';S.viewingProfileId=null;renderApp()},!0)+`<div class="content" style="display:flex;flex-direction:column;align-items:center;gap:16px;">${av(u,'xl')}<div style="font-size:22px;font-weight:600;display:flex;align-items:center;gap:6px;">${u.name}${u.verified?`<span class="verified-badge">${getIcon('verify')}</span>`:''}</div><div style="color:var(--text-secondary);">@${u.username}</div>${u.bio?`<div style="color:var(--text-secondary);">${u.bio}</div>`:''}<button id="mb" style="background:var(--blue);color:white;border:none;padding:10px 24px;border-radius:20px;font-weight:600;">Message</button></div>`;c.querySelector('#nb')?.addEventListener('click',e=>{e.stopPropagation();showNotifications(e)});c.querySelector('#hb')?.addEventListener('click',()=>{S.activeView='search';S.viewingProfileId=null;renderApp()});c.querySelector('#mb').addEventListener('click',()=>{S.activeChatUserId=u.id;S.activeView='chat';renderApp()})};

        const renderSearch=c=>{c.innerHTML=headerHTML('Discover',null,!0)+`<div class="content"><input id="si" class="search-input" placeholder="Search by name or username" value="${S.searchQuery}"><div id="sr"></div></div>`;const si=c.querySelector('#si'),sr=c.querySelector('#sr');const doSearch=()=>{const q=S.searchQuery=si.value.toLowerCase().trim();const res=q?S.users.filter(u=>u.id!==S.currentUser?.id&&(u.username.toLowerCase().includes(q)||u.name.toLowerCase().includes(q))):S.users.filter(u=>u.id!==S.currentUser?.id);sr.innerHTML=res.length?res.map(u=>`<div class="user-card" data-uid="${u.id}">${av(u,'lg')}<div><div style="font-weight:600;display:flex;align-items:center;gap:4px;">${u.name}${u.verified?`<span class="verified-badge">${getIcon('verify')}</span>`:''}</div><div style="color:var(--text-secondary);">@${u.username}</div></div></div>`).join(''):'<div class="empty-state">No users found</div>';sr.querySelectorAll('.user-card').forEach(el=>el.addEventListener('click',()=>{S.viewingProfileId=el.dataset.uid;S.activeView='userProfile';renderApp()}))};si.addEventListener('input',doSearch);doSearch();c.querySelector('#nb')?.addEventListener('click',e=>{e.stopPropagation();showNotifications(e)})};

        const showNotifications=e=>{e.stopPropagation();const ex=document.getElementById('notifDD');if(ex){ex.remove();return}const dd=document.createElement('div');dd.className='notification-dropdown show';dd.id='notifDD';if(!S.notifications.length)dd.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-secondary);">No notifications</div>';else S.notifications.forEach(n=>{const el=document.createElement('div');el.className='notification-item';el.innerHTML=`<div>${n.type==='comment'?'💬':'📩'}</div><div style="flex:1;font-size:14px;">${n.text}<div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${timeAgo(n.time)}</div></div>`;dd.appendChild(el)});document.body.appendChild(dd);setTimeout(()=>document.addEventListener('click',function c(){dd.remove();document.removeEventListener('click',c)}),10)};

        const renderAuth=()=>{if(S.loginBlockedUntil&&Date.now()<S.loginBlockedUntil){const left=Math.ceil((S.loginBlockedUntil-Date.now())/6e4);app.innerHTML=`<div class="auth-container"><div style="font-size:20px;font-weight:600;">Too many attempts</div><div style="color:var(--text-secondary);">Try again in ${left} min</div></div>`;return}const isLogin=S.authMode==='login';app.innerHTML=`<div class="auth-container"><div class="auth-logo">💬</div><div class="auth-title">Pager</div><div style="color:var(--text-secondary);">${isLogin?'Welcome back':'Create your account'}</div>${!isLogin?'<input id="aun" placeholder="Username" class="auth-input"><input id="anm" placeholder="Full Name" class="auth-input">':''}<input id="aem" placeholder="Email" class="auth-input"><input id="apw" type="password" placeholder="Password" class="auth-input"><button id="asb" class="auth-btn primary">${isLogin?'Sign In':'Create Account'}</button><button id="sab" class="auth-btn text">${isLogin?'Create Account':'I have an account'}</button><div style="font-size:13px;color:var(--text-secondary);">Demo: anna@demo.com / 123</div><div id="ae" style="color:var(--red);font-size:13px;"></div></div>`;const showErr=m=>{document.getElementById('ae').textContent=m};document.getElementById('asb').addEventListener('click',()=>{const em=document.getElementById('aem').value,pw=document.getElementById('apw').value;if(isLogin){const u=S.users.find(u=>u.email===em&&u.password===pw);if(!u){S.loginAttempts++;if(S.loginAttempts>=3){S.loginBlockedUntil=Date.now()+9e5;S.loginAttempts=0;showErr('Blocked 15 min');setTimeout(renderAuth,1e3)}else showErr('Invalid credentials');return}if(u.cloudPassword){S.currentUser=u;showCloudPrompt(u)}else{S.currentUser=u;S.loginAttempts=0;save();renderApp()}}else{const un=document.getElementById('aun').value,nm=document.getElementById('anm').value;if(!un||!nm||!em||!pw){showErr('All fields required');return}if(S.users.find(u=>u.email===em)){showErr('Email in use');return}if(S.users.find(u=>u.username===un)){showErr('Username taken');return}S.users.push({id:genId(),username:un,name:nm,email:em,password:pw,cloudPassword:null,avatar:null,verified:!1,bio:''});S.currentUser=S.users[S.users.length-1];S.loginAttempts=0;save();renderApp()}});document.getElementById('sab').addEventListener('click',()=>{S.authMode=isLogin?'register':'login';renderAuth()})};
        const showCloudPrompt=user=>{app.innerHTML=`<div class="auth-container"><div style="font-size:20px;font-weight:600;">Cloud Password</div><div style="color:var(--text-secondary);">Enter your cloud password</div><input id="cpi" type="password" placeholder="Cloud Password" class="auth-input"><button id="cpb" class="auth-btn primary">Verify</button><div id="ae" style="color:var(--red);font-size:13px;"></div></div>`;document.getElementById('cpb').addEventListener('click',()=>{if(document.getElementById('cpi').value!==user.cloudPassword){S.loginAttempts++;if(S.loginAttempts>=3){S.loginBlockedUntil=Date.now()+9e5;S.loginAttempts=0;S.currentUser=null;document.getElementById('ae').textContent='Blocked 15 min';setTimeout(renderAuth,1e3)}else document.getElementById('ae').textContent='Wrong password';return}S.loginAttempts=0;save();renderApp()})};

        seed();load();renderApp();
    </script>
